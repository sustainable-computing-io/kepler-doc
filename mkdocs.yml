site_name: Kepler
theme:
  palette:
    primary: teal
  name: material
  logo: logo.png
  language: en
  custom_dir: overrides
  features:
    - navigation.footer
    - toc.integrate

  highlightjs: true
  hljs_languages:
    - yaml
    - rust

docs_dir: ./docs

# Exclude files that contain links to non-documentation files
exclude_docs: |
  submodules/*/CONTRIBUTING.md
  submodules/*/GOVERNANCE.md
  submodules/*/README.md
  submodules/*/code-of-conduct.md
  submodules/*/MAINTAINERS.md
  submodules/*/SECURITY.md
  submodules/*/Contributors.md
  submodules/*/Operator-SDK.md

nav:
  - Home: index.md
  - Kepler:
      - Getting Started:
          - Installation Guide: submodules/kepler/docs/user/installation.md
      - Concepts/Guides:
          - Power Attribution: submodules/kepler/docs/developer/power-attribution-guide.md
      - Reference:
          - Configuration: submodules/kepler/docs/user/configuration.md
          - Metrics: submodules/kepler/docs/user/metrics.md
      - Developer:
          - Overview: submodules/kepler/docs/developer/index.md
          - Architecture: submodules/kepler/docs/developer/design/architecture/index.md
          - Pre-commit Setup: submodules/kepler/docs/developer/pre-commit.md
          - Release Process: submodules/kepler/docs/developer/release.md
          - Profiling: submodules/kepler/docs/developer/profiling.md
  - Kepler Operator:
      - User Guides:
          - Grafana Deployment: submodules/kepler-operator/docs/user-guides/grafana-deployment.md
      - Developer:
          - Overview: submodules/kepler-operator/docs/developer/README.md
          - Architecture: submodules/kepler-operator/docs/developer/architecture.md
          - Grafana Deployment Overview: submodules/kepler-operator/docs/developer/grafana-deployment-overview.md
          - Pre-commit Hooks: submodules/kepler-operator/docs/developer/pre-commit-hooks.md
      - Reference:
          - API Documentation: submodules/kepler-operator/docs/api.md
          - Release Design: submodules/kepler-operator/docs/design/release.md
      - OpenShift:
          - Overview: kepler-operator/openshift/index.md
          - Quick Start: kepler-operator/openshift/quickstart.md
          - CLI Installation: kepler-operator/openshift/cli-installation.md
      - Usage:
          - Configuration Guide: kepler-operator/configuration/index.md
          - Monitoring & Troubleshooting: kepler-operator/configuration/monitoring-troubleshooting.md
      - Migration:
          - Kepler to PowerMonitor: kepler-operator/migration/index.md
  - Project:
      - Adopters: project/adopters.md
      - Resources: project/resources.md
      - Contributing: project/contributing.md
      - Support: project/support.md
  - Archive (v0.9.0 and below):
      - Overview: archive/README.md
      - Design (Legacy):
          - archive/design/architecture.md
          - archive/design/power_model.md
          - archive/design/metrics.md
          - archive/design/ebpf_in_kepler.md
          - archive/design/kepler-energy-sources.md
      - Installation (Legacy):
          - archive/installation/strategy.md
          - archive/installation/local-cluster.md
          - archive/installation/kepler.md
          - archive/installation/kepler-helm.md
          - archive/installation/community-operator.md
          - archive/installation/kepler-operator.md
          - archive/installation/kepler-rpm.md
          - archive/installation/Kepler-Telegraf-integration-steps.md
      - Usage (Legacy):
          - archive/usage/kepler_daemon.md
          - archive/usage/trouble_shooting.md
          - archive/usage/deep_dive.md
      - Hardware Engagement (Legacy):
          - archive/hardwareengagement/index.md
      - Kepler Model Server (Legacy):
          - Compatibility Notice: model-server-compatibility.md
          - archive/kepler_model_server/get_started.md
          - archive/kepler_model_server/architecture.md
          - archive/kepler_model_server/pipeline.md
          - archive/kepler_model_server/node_profile.md
          - archive/kepler_model_server/power_estimation.md
          - archive/kepler_model_server/api.md

markdown_extensions:
  - admonition
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite

extra:
  version: v0.4

plugins:
  - search:
      lang:
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: Chinese
          build: true
